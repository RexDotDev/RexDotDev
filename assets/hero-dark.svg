<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="420" viewBox="0 0 1280 420" role="img" aria-labelledby="title desc">
  <title id="title">Relja Diklić — product-minded full-stack engineer</title>
  <desc id="desc">I turn product ideas into shipped software across web, mobile, backend, data, AI, and cloud delivery.</desc>
  <defs>
    <linearGradient id="background" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#070a12"/>
      <stop offset="0.52" stop-color="#0b0d19"/>
      <stop offset="1" stop-color="#120a18"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#5cb8ff"/>
      <stop offset="0.48" stop-color="#9d83ff"/>
      <stop offset="1" stop-color="#ff79cf"/>
    </linearGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#141827" stop-opacity="0.96"/>
      <stop offset="1" stop-color="#0f1120" stop-opacity="0.92"/>
    </linearGradient>
    <pattern id="grid" width="28" height="28" patternUnits="userSpaceOnUse">
      <path d="M28 0H0V28" fill="none" stroke="#b8c7ff" stroke-opacity="0.055"/>
    </pattern>
    <filter id="blur" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="48"/>
    </filter>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="20" stdDeviation="25" flood-color="#000000" flood-opacity="0.42"/>
    </filter>
    <style>
      text { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Inter, Arial, sans-serif; }
      .mono { font-family: "SFMono-Regular", Consolas, "Liberation Mono", monospace; }
      .pulse { animation: pulse 3s ease-in-out infinite; transform-origin: center; }
      .drift { animation: drift 7s ease-in-out infinite; }
      @keyframes pulse { 0%, 100% { opacity: .55; } 50% { opacity: 1; } }
      @keyframes drift { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-5px); } }
      @media (prefers-reduced-motion: reduce) { .pulse, .drift { animation: none; } }
    </style>
  </defs>

  <rect width="1280" height="420" rx="30" fill="url(#background)"/>
  <rect width="1280" height="420" rx="30" fill="url(#grid)"/>
  <circle cx="1100" cy="56" r="170" fill="#815dff" fill-opacity="0.23" filter="url(#blur)"/>
  <circle cx="1045" cy="350" r="145" fill="#118dff" fill-opacity="0.18" filter="url(#blur)"/>
  <circle cx="635" cy="90" r="130" fill="#ff4db8" fill-opacity="0.11" filter="url(#blur)"/>
  <rect x="1" y="1" width="1278" height="418" rx="29" fill="none" stroke="#b5bfff" stroke-opacity="0.13"/>

  <g>
    <rect x="54" y="46" width="340" height="34" rx="17" fill="#151a2a" fill-opacity="0.86" stroke="#b8c4ff" stroke-opacity="0.14"/>
    <circle class="pulse" cx="73" cy="63" r="5" fill="#35e39b"/>
    <text x="88" y="68" fill="#b7bfd7" font-size="13" font-weight="700" letter-spacing="1.25">RELJA DIKLIĆ / PRODUCT ENGINEER</text>
  </g>

  <text x="54" y="142" fill="#f6f7fb" font-size="52" font-weight="760" letter-spacing="-2.2">I turn product ideas</text>
  <text x="54" y="202" fill="url(#accent)" font-size="52" font-weight="780" letter-spacing="-2.2">into shipped software.</text>
  <text x="54" y="252" fill="#aab3ca" font-size="18">Product strategy · Web &amp; mobile · Backend &amp; data · AI · Delivery</text>
  <text x="54" y="281" fill="#737d99" font-size="15">From an ambiguous brief to a secure product people can use.</text>

  <g>
    <rect x="54" y="322" width="194" height="57" rx="14" fill="#141827" fill-opacity="0.78" stroke="#b6c1ff" stroke-opacity="0.12"/>
    <text x="72" y="347" fill="#f1f3fb" font-size="18" font-weight="750">5.9K+</text>
    <text x="72" y="367" fill="#8f99b3" font-size="12">contributions since 2024</text>
  </g>
  <g>
    <rect x="260" y="322" width="194" height="57" rx="14" fill="#141827" fill-opacity="0.78" stroke="#b6c1ff" stroke-opacity="0.12"/>
    <text x="278" y="347" fill="#f1f3fb" font-size="18" font-weight="750">7</text>
    <text x="278" y="367" fill="#8f99b3" font-size="12">original product builds</text>
  </g>
  <g>
    <rect x="466" y="322" width="260" height="57" rx="14" fill="#141827" fill-opacity="0.78" stroke="#b6c1ff" stroke-opacity="0.12"/>
    <text x="484" y="347" fill="#f1f3fb" font-size="18" font-weight="750">Web · Mobile · Cloud</text>
    <text x="484" y="367" fill="#8f99b3" font-size="12">end-to-end product delivery</text>
  </g>

  <g class="drift" filter="url(#shadow)">
    <rect x="786" y="48" width="438" height="322" rx="24" fill="url(#panel)" stroke="#c0c8ff" stroke-opacity="0.15"/>
    <circle cx="816" cy="77" r="5" fill="#ff6b78"/>
    <circle cx="834" cy="77" r="5" fill="#ffc454"/>
    <circle cx="852" cy="77" r="5" fill="#35dd8d"/>
    <rect x="884" y="69" width="166" height="16" rx="8" fill="#20263a"/>
    <text x="1107" y="82" fill="#68728e" font-size="11" class="mono">relja.ts</text>
    <path d="M812 103H1198" stroke="#c5cdff" stroke-opacity="0.09"/>

    <text x="820" y="137" fill="#dce1f0" font-size="15" class="mono">
      <tspan fill="#aa91ff">const</tspan><tspan fill="#dce1f0"> relja = {</tspan>
    </text>
    <text x="844" y="169" fill="#dce1f0" font-size="15" class="mono">
      <tspan fill="#ff78c9">role</tspan><tspan fill="#dce1f0">: </tspan><tspan fill="#6ee7c7">"Full-Stack × Product"</tspan><tspan fill="#dce1f0">,</tspan>
    </text>
    <text x="844" y="201" fill="#dce1f0" font-size="15" class="mono">
      <tspan fill="#ff78c9">builds</tspan><tspan fill="#dce1f0">: [</tspan><tspan fill="#6ee7c7">"web"</tspan><tspan fill="#dce1f0">, </tspan><tspan fill="#6ee7c7">"mobile"</tspan><tspan fill="#dce1f0">, </tspan><tspan fill="#6ee7c7">"AI"</tspan><tspan fill="#dce1f0">],</tspan>
    </text>
    <text x="844" y="233" fill="#dce1f0" font-size="15" class="mono">
      <tspan fill="#ff78c9">caresAbout</tspan><tspan fill="#dce1f0">: [</tspan><tspan fill="#6ee7c7">"users"</tspan><tspan fill="#dce1f0">, </tspan><tspan fill="#6ee7c7">"quality"</tspan><tspan fill="#dce1f0">],</tspan>
    </text>
    <text x="844" y="265" fill="#dce1f0" font-size="15" class="mono">
      <tspan fill="#ff78c9">mode</tspan><tspan fill="#dce1f0">: </tspan><tspan fill="#6ee7c7">"build → validate → ship"</tspan>
    </text>
    <text x="820" y="297" fill="#dce1f0" font-size="15" class="mono">};</text>

    <rect x="820" y="319" width="370" height="30" rx="9" fill="#1d2336"/>
    <circle class="pulse" cx="839" cy="334" r="4" fill="#35e39b"/>
    <text x="852" y="339" fill="#9ca6c1" font-size="12" class="mono">ready to turn the next idea into a product</text>
  </g>
</svg>

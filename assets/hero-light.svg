<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="420" viewBox="0 0 1280 420" role="img" aria-labelledby="title desc">
  <title id="title">Relja Diklić — product-minded full-stack engineer</title>
  <desc id="desc">I turn product ideas into shipped software across web, mobile, backend, data, AI, and cloud delivery.</desc>
  <defs>
    <linearGradient id="background" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f8fbff"/>
      <stop offset="0.5" stop-color="#f3f5ff"/>
      <stop offset="1" stop-color="#fff8fc"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#1377ff"/>
      <stop offset="0.48" stop-color="#7357ff"/>
      <stop offset="1" stop-color="#d34bb5"/>
    </linearGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.95"/>
      <stop offset="1" stop-color="#f8f7ff" stop-opacity="0.9"/>
    </linearGradient>
    <pattern id="grid" width="28" height="28" patternUnits="userSpaceOnUse">
      <path d="M28 0H0V28" fill="none" stroke="#65708c" stroke-opacity="0.08"/>
    </pattern>
    <filter id="blur" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="44"/>
    </filter>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="24" flood-color="#343b70" flood-opacity="0.14"/>
    </filter>
    <style>
      text { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Inter, Arial, sans-serif; }
      .mono { font-family: "SFMono-Regular", Consolas, "Liberation Mono", monospace; }
      .pulse { animation: pulse 3s ease-in-out infinite; transform-origin: center; }
      .drift { animation: drift 7s ease-in-out infinite; }
      @keyframes pulse { 0%, 100% { opacity: .55; } 50% { opacity: 1; } }
      @keyframes drift { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-5px); } }
      @media (prefers-reduced-motion: reduce) { .pulse, .drift { animation: none; } }
    </style>
  </defs>

  <rect width="1280" height="420" rx="30" fill="url(#background)"/>
  <rect width="1280" height="420" rx="30" fill="url(#grid)"/>
  <circle cx="1100" cy="56" r="160" fill="#9c68ff" fill-opacity="0.18" filter="url(#blur)"/>
  <circle cx="1045" cy="350" r="140" fill="#19b5ff" fill-opacity="0.14" filter="url(#blur)"/>
  <circle cx="635" cy="90" r="120" fill="#ff6dbc" fill-opacity="0.09" filter="url(#blur)"/>
  <rect x="1" y="1" width="1278" height="418" rx="29" fill="none" stroke="#29345c" stroke-opacity="0.12"/>

  <g>
    <rect x="54" y="46" width="278" height="34" rx="17" fill="#ffffff" fill-opacity="0.82" stroke="#3d4a70" stroke-opacity="0.14"/>
    <circle class="pulse" cx="73" cy="63" r="5" fill="#1bc47d"/>
    <text x="88" y="68" fill="#49536e" font-size="13" font-weight="700" letter-spacing="1.25">RELJA DIKLIĆ / PRODUCT ENGINEER</text>
  </g>

  <text x="54" y="142" fill="#11172a" font-size="52" font-weight="760" letter-spacing="-2.2">I turn product ideas</text>
  <text x="54" y="202" fill="url(#accent)" font-size="52" font-weight="780" letter-spacing="-2.2">into shipped software.</text>
  <text x="54" y="252" fill="#4b5571" font-size="18">Product strategy · Web &amp; mobile · Backend &amp; data · AI · Delivery</text>
  <text x="54" y="281" fill="#747d96" font-size="15">From an ambiguous brief to a secure product people can use.</text>

  <g>
    <rect x="54" y="322" width="194" height="57" rx="14" fill="#ffffff" fill-opacity="0.74" stroke="#26345f" stroke-opacity="0.12"/>
    <text x="72" y="347" fill="#11172a" font-size="18" font-weight="750">5.9K+</text>
    <text x="72" y="367" fill="#6c7690" font-size="12">contributions since 2024</text>
  </g>
  <g>
    <rect x="260" y="322" width="194" height="57" rx="14" fill="#ffffff" fill-opacity="0.74" stroke="#26345f" stroke-opacity="0.12"/>
    <text x="278" y="347" fill="#11172a" font-size="18" font-weight="750">7</text>
    <text x="278" y="367" fill="#6c7690" font-size="12">original product builds</text>
  </g>
  <g>
    <rect x="466" y="322" width="260" height="57" rx="14" fill="#ffffff" fill-opacity="0.74" stroke="#26345f" stroke-opacity="0.12"/>
    <text x="484" y="347" fill="#11172a" font-size="18" font-weight="750">Web · Mobile · Cloud</text>
    <text x="484" y="367" fill="#6c7690" font-size="12">end-to-end product delivery</text>
  </g>

  <g class="drift" filter="url(#shadow)">
    <rect x="786" y="48" width="438" height="322" rx="24" fill="url(#panel)" stroke="#334168" stroke-opacity="0.16"/>
    <circle cx="816" cy="77" r="5" fill="#ff6b6b"/>
    <circle cx="834" cy="77" r="5" fill="#ffc24b"/>
    <circle cx="852" cy="77" r="5" fill="#28ca72"/>
    <rect x="884" y="69" width="166" height="16" rx="8" fill="#e8ebf5"/>
    <text x="1107" y="82" fill="#8a92a8" font-size="11" class="mono">relja.ts</text>
    <path d="M812 103H1198" stroke="#202d52" stroke-opacity="0.1"/>

    <text x="820" y="137" fill="#20283d" font-size="15" class="mono">
      <tspan fill="#7357ff">const</tspan><tspan fill="#20283d"> relja = {</tspan>
    </text>
    <text x="844" y="169" fill="#20283d" font-size="15" class="mono">
      <tspan fill="#c33e9c">role</tspan><tspan fill="#20283d">: </tspan><tspan fill="#087c68">"Full-Stack × Product"</tspan><tspan fill="#20283d">,</tspan>
    </text>
    <text x="844" y="201" fill="#20283d" font-size="15" class="mono">
      <tspan fill="#c33e9c">builds</tspan><tspan fill="#20283d">: [</tspan><tspan fill="#087c68">"web"</tspan><tspan fill="#20283d">, </tspan><tspan fill="#087c68">"mobile"</tspan><tspan fill="#20283d">, </tspan><tspan fill="#087c68">"AI"</tspan><tspan fill="#20283d">],</tspan>
    </text>
    <text x="844" y="233" fill="#20283d" font-size="15" class="mono">
      <tspan fill="#c33e9c">caresAbout</tspan><tspan fill="#20283d">: [</tspan><tspan fill="#087c68">"users"</tspan><tspan fill="#20283d">, </tspan><tspan fill="#087c68">"quality"</tspan><tspan fill="#20283d">],</tspan>
    </text>
    <text x="844" y="265" fill="#20283d" font-size="15" class="mono">
      <tspan fill="#c33e9c">mode</tspan><tspan fill="#20283d">: </tspan><tspan fill="#087c68">"build → validate → ship"</tspan>
    </text>
    <text x="820" y="297" fill="#20283d" font-size="15" class="mono">};</text>

    <rect x="820" y="319" width="370" height="30" rx="9" fill="#eef1fa"/>
    <circle class="pulse" cx="839" cy="334" r="4" fill="#1bc47d"/>
    <text x="852" y="339" fill="#56607b" font-size="12" class="mono">ready to turn the next idea into a product</text>
  </g>
</svg>

name: Refresh profile visuals

on:
  schedule:
    # Weekly refresh at 03:17 UTC.
    - cron: "17 3 * * 1"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: profile-visuals
  cancel-in-progress: true

jobs:
  generate:
    name: Generate contribution visuals
    runs-on: ubuntu-latest
    timeout-minutes: 12
    permissions:
      contents: read

    steps:
      - name: Check out profile repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Generate contribution snake
        uses: Platane/snk/svg-only@d8f6715049803e982ee5ff501b6b9b7d5deeb09b # v3.5.0
        with:
          github_user_name: ${{ github.repository_owner }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          outputs: |
            assets/generated/contribution-snake-light.svg?palette=github-light&color_snake=blue
            assets/generated/contribution-snake-dark.svg?palette=github-dark&color_snake=blue

      - name: Generate 3D contribution calendar
        uses: yoshi389111/github-profile-3d-contrib@7d95e7d4cdc028dd1e1cbd957d65f35efb12ae39 # v0.9.3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          USERNAME: ${{ github.repository_owner }}

      - name: Package generated visuals
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: profile-visuals
          path: |
            assets/generated/contribution-snake-light.svg
            assets/generated/contribution-snake-dark.svg
            profile-3d-contrib/profile-night-rainbow.svg
            profile-3d-contrib/profile-gitblock.svg
          if-no-files-found: error
          retention-days: 1
          compression-level: 9

  publish:
    name: Publish changed visuals
    needs: generate
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: write

    steps:
      - name: Check out profile repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Download generated visuals
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: profile-visuals
          path: .

      - name: Commit changed visuals
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -- assets/generated/contribution-snake-light.svg
          git add -- assets/generated/contribution-snake-dark.svg
          git add -- profile-3d-contrib/profile-night-rainbow.svg
          git add -- profile-3d-contrib/profile-gitblock.svg

          if git diff --cached --quiet; then
            echo "Profile visuals are already current."
          else
            git commit -m "chore: refresh profile visuals"
            git push
          fi
